            soundType = 'jackpot';
        }
    } 
    else if (boxType === 'prata') {
        boxName = 'Caixa de Pandora';
        if (roll < 0.50) {
            STATS.moedas += 100; STATS.earnedXP += 100;
            rewardHtml = `<b>100 🪙</b> e <b>100 XP ✨</b><br><span style="color:var(--stone2); font-size:10px">(A esperança foi a última a morrer...)</span>`;
        } else if (roll < 0.85) {
            STATS.inventory.doubleCoins += 2;
            rewardHtml = `<b style="color:var(--gold)">2x Néctar dos Deuses 🍷</b><br><span style="color:var(--green); font-size:10px">(Vale 500 🪙!)</span>`;
            soundType = 'win';
        } else {
            STATS.earnedXP += 1500;
            rewardHtml = `<b style="color:#e024ff; font-size:20px">1.500 XP ✨</b><br><span style="color:#e024ff; font-size:10px">(JACKPOT DE SABEDORIA!)</span>`;
            soundType = 'jackpot';
        }
    }
    else if (boxType === 'ouro') {
        boxName = 'Baú do Olimpo';
        if (roll < 0.50) {
            STATS.inventory.doubleXp += 3;
            rewardHtml = `<b style="color:#00e5ff">3x Água de Mnemósine 💧</b><br><span style="color:var(--stone2); font-size:10px">(Vale 750 🪙. Você perdeu dinheiro...)</span>`;
        } else if (roll < 0.85) {
            STATS.inventory.doubleCoins += 4; STATS.inventory.doubleXp += 4;
            rewardHtml = `<b style="color:var(--gold)">4x Néctar 🍷 e 4x Água 💧</b><br><span style="color:var(--green); font-size:10px">(Vale 2.000 🪙! Lucrou absurdo!)</span>`;
            soundType = 'win';
        } else {
            STATS.moedas += 3000; STATS.earnedXP += 5000;
            rewardHtml = `<b style="color:#ff245e; font-size:24px; text-shadow: 0 0 10px #ff245e">3.000 🪙 e 5.000 XP ✨</b><br><b style="color:var(--gold); font-size:12px">O JACKPOT SUPREMO!</b>`;
            soundType = 'jackpot';

        <div style="text-align:center; padding:10px">
            <h3 style="color:var(--gold); margin-bottom:15px">🎁 ${boxName} Aberta!</h3>
            <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:20px; margin-bottom:20px; animation: fadeIn 0.5s">
                <p style="font-size:12px; color:var(--stone2); margin-bottom:10px">O que havia lá dentro:</p>
                <div style="font-size:16px;">${rewardHtml}</div>

            <button class="btn success" style="width:100%" onclick="openStoreModal()">Voltar para a Loja</button>

}
// ✨ SINTETIZADOR RETRÔ DE ÁUDIO PARA O GACHA
function playGachaSound(type) {
    // Obedece ao seu botão de Áudio do topo da tela!
    if (typeof autoPlayAudio !== 'undefined' && !autoPlayAudio) return;
    
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        const now = ctx.currentTime;
        
        if (type === 'loss') {
            // 🌩️ Som de Decepção (Trombone triste caindo)
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.6);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        } 
        else if (type === 'win') {
            // 🎉 Som Feliz (Moedinhas / Lucro)
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } 
        else if (type === 'jackpot') {
            // 💎 Som ÉPICO de Jackpot (Arpejo subindo aos céus)
            osc.type = 'sine';
            const notes = [440, 554.37, 659.25, 880, 1108.73, 1318.51, 1760]; // Acorde Épico Subindo
            notes.forEach((freq, i) => {
                osc.frequency.setValueAtTime(freq, now + (i * 0.08));
            });
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + (notes.length * 0.08));
            osc.start(now);
            osc.stop(now + (notes.length * 0.08));
        }
    } catch(e) { 
        console.log('Áudio não suportado no navegador.'); 
    }
}

(async function init() {
  await load(); // ✨ ADICIONE A PALAVRA "await" AQUI 
  await new Promise(r => setTimeout(r, 900));
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
})();
/* ═══════════════════════════════════════
   🧠 MOTOR DE MEMÓRIA DE INTERFACE E GAVETAS (INTELIGENTE)
═══════════════════════════════════════ */
const ignoreList = ['fw_type', 'fw_lang_word', 'fw_lang_def', 'fw_class']; 

// O EventListener original (Intacto!)
document.addEventListener('change', (e) => {
  if (e.target.tagName === 'SELECT' && e.target.id && !ignoreList.includes(e.target.id)) {
    localStorage.setItem('ui_pref_' + e.target.id, e.target.value);
  }
  if (e.target.classList.contains('custom-mode-cb')) {
    localStorage.setItem('ui_pref_cb_' + e.target.value, e.target.checked);
  }
}, true);

// ✨ NOVA FUNÇÃO: O botão que abre e fecha as Gavetas Manuais
function toggleSection(sectionId) {
    const content = document.getElementById(sectionId + '-content');
    const icon = document.getElementById(sectionId + '-icon');
    if (!content) return;
    
    const isCollapsed = content.style.display === 'none';
    
    if (isCollapsed) {
        content.style.display = 'block';
        if (icon) icon.textContent = '▼';
        localStorage.setItem('ui_toggle_' + sectionId, 'open'); // Salva no dispositivo
    } else {
        content.style.display = 'none';
        if (icon) icon.textContent = '▶';
        localStorage.setItem('ui_toggle_' + sectionId, 'closed'); // Salva no dispositivo
    }
}

// O seu Observador Ninja Único!
const uiObserver = new MutationObserver(() => {
  let needsListUpdate = false;
  let needsImportUpdate = false;

  // --- 1. A SUA LÓGICA ORIGINAL (Selects e Checkboxes) ---
  document.querySelectorAll('select[id]').forEach(sel => {
    if (ignoreList.includes(sel.id)) return; 
    
    const saved = localStorage.getItem('ui_pref_' + sel.id);
    if (saved !== null && sel.value !== saved) {
      const optionExists = Array.from(sel.options).some(opt => opt.value === saved);
      if (optionExists) {
        sel.value = saved;
        if (sel.id === 'wordCat' || sel.id === 'wordSort') needsListUpdate = true;
        if (sel.id === 'importType') needsImportUpdate = true;
      }
    }
  });
  
  document.querySelectorAll('.custom-mode-cb').forEach(cb => {
    const saved = localStorage.getItem('ui_pref_cb_' + cb.value);
    if (saved !== null) {
      const isChecked = (saved === 'true');
      if (cb.checked !== isChecked) {
        cb.checked = isChecked;
        const label = cb.closest('label');
        if (label) label.style.borderColor = isChecked ? 'var(--gold)' : 'var(--border2)';
      }
    }
  });

  // --- 2. ✨ A NOVA LÓGICA (Vigiando as Gavetas) ---
  const sections = ['sec-manual', 'sec-magic', 'sec-rev', 'sec-free'];
  
  sections.forEach(sec => {
      const content = document.getElementById(sec + '-content');
      const icon = document.getElementById(sec + '-icon');
      
      // Se a gaveta acabou de renderizar na tela...
      if (content && !content.dataset.loaded) {
          const state = localStorage.getItem('ui_toggle_' + sec) || 'open'; 
          
          if (state === 'closed') {
              content.style.display = 'none';
              if (icon) icon.textContent = '▶';
          } else {
              content.style.display = 'block';
              if (icon) icon.textContent = '▼';
          }
          
          content.dataset.loaded = 'true'; // Evita piscar a tela infinitamente!
      }
  });

  // Dispara as atualizações visuais finais do seu código original
  if (needsListUpdate && typeof updateWordList === 'function') updateWordList();
  if (needsImportUpdate && typeof handleImportTypeChange === 'function') handleImportTypeChange();
});

// Liga o observador unificado!
uiObserver.observe(document.body, { childList: true, subtree: true });
</script>

function buildContextMode(card) {
  const sess = studySession;
  const answered = sess.contextAnswered;
  const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';
  let blanked = '', revealed = '';
  
  if (card.example) {
        let cleanEx = clean(card.example); 
        let targetWord = clean(card.word).trim(); 
        
        // ✨ O CÃO DE GUARDA DEFINITIVO (Blindagem contra Acentos e Maiúsculas)
        // Removemos TODOS os acentos da frase e da palavra só para fazer a busca
        const normEx = cleanEx.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        const normWord = targetWord.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        
        // Pega a raiz da palavra limpa (sem acento)
        let rootLen = Math.max(4, Math.floor(normWord.length * 0.8));
        let rootWord = normWord.substring(0, rootLen);
        
        // Como a frase agora não tem acentos na busca, o limite de palavra (\b) funciona com perfeição
        let regex = new RegExp('\\b' + escReg(rootWord) + '[a-z]*\\b', 'g');
        
        let matches = [];
        let m;
        while ((m = regex.exec(normEx)) !== null) {
            matches.push({ start: m.index, end: m.index + m[0].length });
        }
        
        let bArr = [], rArr = [], lastIdx = 0;
        
        // Monta a frase recortando as palavras originais (preservando os acentos reais na tela)
        for (let i = 0; i < matches.length; i++) {
            const match = matches[i];
            const before = cleanEx.substring(lastIdx, match.start);
            const originalWord = cleanEx.substring(match.start, match.end);
            
            bArr.push(esc(before));
            rArr.push(esc(before));
            
            if (isRel) {
                // Sinônimo / Antônimo: Destaca a palavra
                bArr.push('<b style="color:var(--gold2); border-bottom: 2px dashed var(--gold2)">' + esc(originalWord) + '</b>');
                rArr.push('<mark>' + esc(originalWord) + '</mark>');
            } else {
                // Carta Normal: Esconde com o número exato de tracinhos!
                bArr.push('_ '.repeat(originalWord.length)); 
                rArr.push('<mark>' + esc(originalWord) + '</mark>');
            }
            lastIdx = match.end;
        }
        
        bArr.push(esc(cleanEx.substring(lastIdx)));
        rArr.push(esc(cleanEx.substring(lastIdx)));
        
        let bText = bArr.join('');
        let rText = rArr.join('');

        // ✨ HARDCORE CONTEXT (Esconde uma palavra extra se a carta for velha)
        if (!isRel && card.interval >= 7) {
            const words = cleanEx.split(/\s+/);
            const eligible = words.filter(w => {
                 let cleanW = w.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[.,!?;:"'()]/g, '');
                 return cleanW.length > 5 && !cleanW.includes(rootWord);
            });
            if (eligible.length > 0) {
                const extraTarget = eligible[Math.floor(Math.random() * eligible.length)].replace(/[.,!?;:"'()]/g, '');
                const safeExtra = esc(extraTarget);
                bText = bText.replace(new RegExp('(' + escReg(safeExtra) + ')', 'g'), (match) => '<span style="opacity:0.3">' + '_'.repeat(match.length) + '</span>');
            }
        }
        
        blanked = bText;
        revealed = rText;
      } else {
    if (isRel) {
      blanked = `<span style="font-size:14px;color:var(--stone)">Palavra base:</span><br><b style="color:var(--gold2);font-size:20px">${esc(card.word)}</b><br><br>Digite UM ${hl(card.cardType)}: ______`;
      revealed = `<span style="font-size:14px;color:var(--stone)">Palavra base:</span><br><b style="color:var(--gold2);font-size:20px">${esc(card.word)}</b>`;
    } else {
      blanked = `<span style="font-size:14px;color:var(--stone)">Significa:</span><br><i>"${esc(clean(card.definition))}"</i><br><br>A palavra é: ______`;
      revealed = `<span style="font-size:14px;color:var(--stone)">Significa:</span><br><i>"${esc(clean(card.definition))}"</i><br><br>A palavra é: <mark>${esc(card.word)}</mark>`;
    }
  }
  
  const promptTxt = isRel ? `Complete com UM ${hl(card.cardType)}:` : 'Complete a lacuna:';
  const micLang = isRel ? (card.langDef || 'pt-BR') : (card.langWord || 'pt-BR');

  let html = `
    <div class="context-card">
      <div class="context-q">${promptTxt}</div>
      ${renderVisual(card)}<div class="context-text" id="ctxText">${answered ? revealed : blanked}</div>
    </div>`;

  if (!isRel) {
    html += `
    <div style="margin-bottom:10px">
      <div class="lbl">Definição contextual</div>
      <div style="font-size:15px;color:var(--ink2);font-style:italic;line-height:1.7">${esc(clean(card.definition))}</div>
    </div>`;
  }

  if (!answered) {
    html += `
    <div style="display:flex;gap:8px">
      <button class="btn ghost sm" id="hintBtn" onclick="useHint()" title="Usar Dica" style="padding:0 12px; font-size:18px; border-color:var(--border2)">💡</button>
      <button class="btn ghost sm" onclick="startDictation('ctxInput', '${micLang}', this)" title="Falar Resposta" style="padding:0 12px; font-size:18px; border-color:var(--border2)">🎙️</button>
      <input class="inp" id="ctxInput" placeholder="Escreva a palavra..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkContext()">
      <button class="btn gold" style="width:auto;padding:10px 16px" onclick="checkContext()">→</button>
    </div>
    <div id="hint-display" style="display:${sess.hintUsed ? 'block' : 'none'}; font-size:14px; color:var(--gold2); margin-top:10px; font-weight:600; text-align:center">
       ${sess.hintUsed ? `💡 <b>Dica:</b> ${sess.hintText}` : ''}
    </div>
    <button class="btn ghost" style="margin-top:8px" onclick="skipContext()">Ver resposta →</button>`;
  } else {
    html += `
    <div class="type-result ${sess.contextCorrect ? 'ok' : 'fail'}" style="margin-bottom:10px">
      ${sess.contextCorrect ? `✓ Excelente!` : `✗ Incorreto.`}
    </div>`;
    if (isRel) {
       html += `<div class="quote" style="margin-bottom:10px; border-color: ${sess.contextCorrect ? 'var(--green)' : 'var(--red)'}"><b>Opções válidas:</b><br><span style="color:var(--ink)">${esc(clean(card.definition))}</span></div>`;
    } else if (!sess.contextCorrect) {
       html += `<div class="quote" style="margin-bottom:10px; border-color: var(--red)">A palavra correta era: "${esc(card.word)}"</div>`;
    }
    html += getRatingRowHtml(sess.contextCorrect, 'Perfeito ✓');
  }
  return html;
}

    const chars = sess.spellTarget.replace(/[\s\u200B-\u200D\uFEFF]/g, '').toUpperCase().split('');

          ${ansHtml}
        </div>
        ${!answered ? `<div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center">${availHtml}</div>` : ''}
      </div>
    </div>
    ${!answered ? `
    <div style="display:flex;gap:8px">
      <button class="btn ghost" style="flex:1; border-color:var(--gold2); color:var(--gold2)" id="hintBtn" onclick="useHint()">💡 Dica</button>
      <button class="btn ghost" style="flex:1" onclick="spellClear()">⟲ Limpar</button>
      <button class="btn gold" style="flex:2" onclick="checkSpell()">Verificar →</button>
    </div>
    <div id="hint-display" style="display:${sess.hintUsed ? 'block' : 'none'}; font-size:14px; color:var(--gold2); margin-top:12px; font-weight:600; text-align:center">
       ${sess.hintUsed ? `💡 <b>Dica:</b> ${sess.hintText}` : ''}
    </div>` : `
    <div class="type-result ${sess.spellCorrect ? 'ok' : 'fail'}" style="margin-bottom:10px">
      ${sess.spellCorrect ? `✓ Excelente! "${esc(sess.spellTarget)}"` : `✗ A palavra correta é: "${esc(sess.spellTarget)}"`}
    </div>
    ${getRatingRowHtml(sess.spellCorrect, 'Correto ✓')}`}
  `;
}

function buildSyntaxMode(card) {
  const sess = studySession;
  const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';

  if (!sess.syntaxSetup) {
    if (isRel && !card.example) {
      const valids = getValidAnswers(card);
      const targetsToFind = valids.sort(() => Math.random() - 0.5).slice(0, 4);
      sess.syntaxNeededCount = Math.min(3, targetsToFind.length);

      let others = W.filter(w => w.id !== card.id).flatMap(w => w.cardType === 'sinônimo' || w.cardType === 'antônimo' ? getValidAnswers(w) : [w.word]);
      if (others.length < 6) others = [...others, "inefável", "assertivo", "prolixo", "efêmero", "pragmático", "eloquente"];
      
      const fakes = [...new Set(others)].filter(opt => !valids.includes(opt)).sort(() => Math.random() - 0.5).slice(0, 6);
      const poolWords = [...targetsToFind, ...fakes].sort(() => Math.random() - 0.5);
      
      sess.syntaxPool = poolWords.map((w, i) => ({ id: i, word: clean(w) }));
      sess.syntaxTargetWords = valids; 
      sess.isSynonymMatch = true;
    } else {
      const textToOrder = clean(card.example || card.definition);
      const words = textToOrder.split(/\s+/).filter(Boolean);
      sess.syntaxTarget = textToOrder;
      sess.syntaxPool = words.map((w, i) => ({ id: i, word: w })).sort(() => Math.random() - 0.5);
      sess.isSynonymMatch = false;
    }
    sess.syntaxAnswer = [];
    sess.syntaxSetup = true;
  }
  
  const answered = sess.syntaxAnswered;
  const ansHtml = sess.syntaxAnswer.map(id => {
    const item = sess.syntaxPool.find(p => p.id === id);
    return `<button class="btn gold sm" style="padding:6px 12px;font-size:14px;width:auto;text-transform:none;letter-spacing:normal" onclick="${answered?'':`syntaxRemove(${id})`}">${esc(item.word)}</button>`;
  }).join('');

  const availHtml = sess.syntaxPool.filter(p => !sess.syntaxAnswer.includes(p.id)).map(item => {
    return `<button class="btn ghost sm" style="padding:6px 12px;font-size:14px;width:auto;border-color:var(--border2);text-transform:none;letter-spacing:normal" onclick="${answered?'':`syntaxAdd(${item.id})`}">${esc(item.word)}</button>`;
  }).join('');

  const promptTxt = sess.isSynonymMatch ? `Selecione pelo menos ${sess.syntaxNeededCount} ${hl(card.cardType + 's')} válidos:` : 'Ordene a frase/conceito:';
  let feedbackTxt = sess.isSynonymMatch ? `<b>Opções válidas:</b> ${esc(clean(card.definition))}` : `"${esc(sess.syntaxTarget)}"`;

  return `
    <div class="card" style="margin-bottom:12px">
      <div class="card-body" style="text-align:center">
        <div class="fc-type" style="margin-bottom:8px">${promptTxt}</div>
        ${renderVisual(card)}
        ${card.cardType !== 'citação' ? `<div class="fc-word" style="font-size:20px;margin-bottom:12px">${esc(card.word)}</div>` : ''}
        
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;min-height:60px;padding:12px;background:rgba(0,0,0,0.3);border-radius:var(--r);border:1px dashed var(--border3);margin-bottom:16px">
          ${ansHtml}
        </div>
        ${!answered ? `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">${availHtml}</div>` : ''}
      </div>
    </div>
    ${!answered ? `
    <div style="display:flex;gap:8px">
      <button class="btn ghost" style="flex:1; border-color:var(--gold2); color:var(--gold2)" id="hintBtn" onclick="useHint()">💡 Dica</button>
      <button class="btn ghost" style="flex:1" onclick="syntaxClear()">⟲ Limpar</button>
      <button class="btn gold" style="flex:2" onclick="checkSyntax()">Verificar →</button>
    </div>
    <div id="hint-display" style="display:${sess.hintUsed ? 'block' : 'none'}; font-size:14px; color:var(--gold2); margin-top:12px; font-weight:600; text-align:center">
       ${sess.hintUsed ? `💡 <b>Dica:</b> ${sess.hintText}` : ''}
    </div>` : `
    <div class="type-result ${sess.syntaxCorrect ? 'ok' : 'fail'}" style="margin-bottom:10px">
      ${sess.syntaxCorrect ? `✓ Excelente!` : `✗ Incorreto.`}
      <div style="margin-top:6px;font-size:14px;color:var(--ink);font-style:italic">${feedbackTxt}</div>
    </div>
    ${getRatingRowHtml(sess.syntaxCorrect, 'Correto ✓')}`}
  `;
}

function buildClozeMode(card) {
  const sess = studySession;
  const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';

  if (!sess.clozeSetup) {
    let text = "", blanks = [], poolWords = [], isRelList = false;

    if (isRel && !card.example) {
      isRelList = true;
      const valids = getValidAnswers(card);
      const numBlanks = Math.min(3, valids.length);
      blanks = valids.sort(() => Math.random() - 0.5).slice(0, numBlanks);
      text = Array(numBlanks).fill('___').join(' &nbsp;•&nbsp; ');
      
      let others = W.filter(w => w.id !== card.id).flatMap(w => w.cardType === 'sinônimo' || w.cardType === 'antônimo' ? getValidAnswers(w) : [w.word]);
      if (others.length < 6) others = [...others, "inefável", "assertivo", "prolixo", "efêmero", "pragmático"];
      const fakes = [...new Set(others)].filter(opt => !valids.includes(opt)).sort(() => Math.random() - 0.5).slice(0, 5);
      poolWords = [...blanks, ...fakes];
    } else {
      text = isRel ? card.example : card.definition; 
      let matches = [...text.matchAll(/\*([^*]+)\*/g)];
      if (matches.length > 0) {
         matches.forEach(m => blanks.push(m[1].trim()));
         text = text.replace(/\*([^*]+)\*/g, '___');
      } else {
         let words = text.split(/\s+/);
         let eligible = words.filter(w => w.replace(/[.,!?;:"'()]/g, '').length > 4);
         let selectedToHide = eligible.sort(() => Math.random() - 0.5).slice(0, 2); 
         let newTextArr = [];
         words.forEach(w => {
           if (selectedToHide.includes(w)) {
             let cleanWord = w.replace(/[.,!?;:"'()]/g, '');
             blanks.push(cleanWord); 
             newTextArr.push(w.replace(cleanWord, '___'));
             selectedToHide.splice(selectedToHide.indexOf(w), 1);
           } else {
             newTextArr.push(w);
           }
         });
         text = newTextArr.join(' ');
      }
      
      let others = W.filter(w => w.id !== card.id).map(w => w.word);
      if (others.length < 8) others = [...others, "intrínseco", "efêmero", "pragmático", "eloquente", "inefável", "prolixo", "sagaz", "peculiar"];
      
      const numFakes = Math.max(4, 7 - blanks.length); 
      const fakes = [...new Set(others)]
        .filter(opt => !blanks.includes(clean(opt)) && clean(opt) !== clean(card.word))
        .sort(() => Math.random() - 0.5).slice(0, numFakes);

      poolWords = [...blanks, ...fakes];

      if (isRel) {
         const valids = getValidAnswers(card);
         const extraSyns = valids.filter(v => !poolWords.includes(v));
         poolWords = [...poolWords, ...extraSyns];
      }
    }
    
    sess.clozeText = text; sess.clozeAnswers = blanks; 
    sess.clozePool = [...new Set(poolWords)].map((w,i)=>({id:i, word:clean(w)})).sort(() => Math.random() - 0.5);
    sess.clozeUserAnswers = []; sess.clozeIsRelList = isRelList; sess.clozeSetup = true;
  }
  
  const answered = sess.clozeAnswered;
  let displayText = sess.clozeText, slotIndex = 0;
  
  displayText = displayText.replace(/___/g, () => {
     if (slotIndex < sess.clozeUserAnswers.length) {
        const pickedId = sess.clozeUserAnswers[slotIndex++];
        const word = sess.clozePool.find(p=>p.id === pickedId).word;
        return `<span style="color:var(--gold2);text-decoration:underline;cursor:pointer" onclick="${answered?'':`clozeRemove(${pickedId})`}">${esc(word)}</span>`;
     } else {
        slotIndex++;
        return `<span style="opacity:0.3">______</span>`;
     }
  });

  const availHtml = sess.clozePool.filter(p => !sess.clozeUserAnswers.includes(p.id)).map(item => {
    return `<button class="btn ghost sm" style="padding:6px 12px;font-size:14px;width:auto;border-color:var(--border2);text-transform:none;letter-spacing:normal" onclick="${answered?'':`clozeAdd(${item.id})`}">${esc(item.word)}</button>`;
  }).join('');

  const promptTxt = sess.clozeIsRelList ? `Selecione ${sess.clozeAnswers.length} ${hl(card.cardType + 's')}:` : 'Preencha as lacunas na ordem:';

  return `
    <div class="card" style="margin-bottom:12px">
      <div class="card-body" style="text-align:center">
        <div class="fc-type" style="margin-bottom:8px">${promptTxt}</div>
        ${renderVisual(card)}
        ${card.cardType !== 'citação' ? `<div class="fc-word" style="font-size:20px;margin-bottom:12px">${esc(card.word)}</div>` : ''}
        <div style="font-size:18px;line-height:1.6;color:var(--ink);font-style:italic;margin-bottom:16px;text-align:${sess.clozeIsRelList ? 'center' : 'left'};padding:10px;background:rgba(0,0,0,0.2);border-radius:var(--r)">
          ${sess.clozeIsRelList ? displayText : `"${displayText}"`}
        </div>
        ${!answered && availHtml ? `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">${availHtml}</div>` : ''}
      </div>
    </div>
    ${!answered ? `
    <div style="display:flex;gap:8px">
      <button class="btn ghost" style="flex:1; border-color:var(--gold2); color:var(--gold2)" id="hintBtn" onclick="useHint()">💡 Dica</button>
      <button class="btn ghost" style="flex:1" onclick="clozeClear()">⟲ Limpar</button>
      <button class="btn gold" style="flex:2" onclick="checkCloze()">Verificar →</button>
    </div>
    <div id="hint-display" style="display:${sess.hintUsed ? 'block' : 'none'}; font-size:14px; color:var(--gold2); margin-top:12px; font-weight:600; text-align:center">
       ${sess.hintUsed ? `💡 <b>Dica:</b> ${sess.hintText}` : ''}
    </div>` : `
    <div class="type-result ${sess.clozeCorrect ? 'ok' : 'fail'}" style="margin-bottom:10px">
      ${sess.clozeCorrect ? `✓ Excelente!` : `✗ Incorreto.`}
    </div>
    <div class="quote" style="margin-bottom:10px; border-color: ${sess.clozeCorrect ? 'var(--green)' : 'var(--red)'}">
       ${esc(clean(card.definition))}
    </div>
    ${getRatingRowHtml(sess.clozeCorrect, 'Correto ✓')}`}
  `;
}

/* ── MODO: ESCOLHA VISUAL (DUOLINGO STYLE) ── */
function buildImgChoiceMode(card) {
  const sess = studySession;
  
  if (!sess.imgChoices) {
    // ✨ ESCUDO DE PROTEÇÃO MÁXIMA: Garante que não vai dar erro se a imagem for vazia
    const imgTarget = card.image || ''; 
    const isPhoto = imgTarget.startsWith('data:image');
    let others = [];

    if (isPhoto) {
      // Universo 1: A resposta certa é uma FOTO. Vamos puxar SÓ outras fotos do banco!
      others = W.filter(w => w.id !== card.id && w.image && w.image.startsWith('data:image')).map(w => w.image);
      
      // Se não tiver fotos suficientes no banco, preenche com emojis
      if (others.length < 3) {
        others = [...others, '🍎', '🚗', '🐱', '🎸', '💡', '🔥', '⚙️', '🌊', '🏛️', '🎭', '🌿', '⚡'];
      }
    } else {
      // Universo 2: A resposta certa é um EMOJI. Vamos puxar SÓ emojis do banco!
      others = W.filter(w => w.id !== card.id && w.image && !w.image.startsWith('data:image')).map(w => w.image);
      
      // Se não tiver emojis suficientes no banco, puxa da reserva
      if (others.length < 3) {
        others = [...others, '🍎', '🚗', '🐱', '🎸', '💡', '🔥', '⚙️', '🌊', '🏛️', '🎭', '🌿', '⚡'];
      }
    }
    
    // Remove duplicatas e tira a resposta certa do meio (se estiver por engano)
    others = [...new Set(others)].filter(img => img !== imgTarget).sort(() => Math.random() - 0.5).slice(0, 3);
    
    // Junta a resposta certa com as 3 erradas e embaralha tudo
    sess.imgChoices = [...others, imgTarget].sort(() => Math.random() - 0.5);
  }
  
  const answered = sess.imgChoiceAnswered;

  // Função interna para desenhar o quadrado perfeitamente, seja foto base64 ou emoji
  const renderSquare = (img) => {
    if (!img) return ''; // Proteção contra travamento
    if (img.startsWith('data:image')) {
      return `<div style="width:100%; height:100%; background-image:url('${img}'); background-size:cover; background-position:center;"></div>`;
    } else {
      return `<div style="font-size:60px; display:flex; align-items:center; justify-content:center; width:100%; height:100%">${esc(img)}</div>`;
    }
  };

  return `
    <div class="card" style="margin-bottom:12px">
      <div class="card-body" style="text-align:center">
        <div class="fc-type" style="margin-bottom:10px">Qual imagem representa:</div>
        <div class="fc-word">${esc(card.word)}</div>
      </div>
    </div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px">
      ${sess.imgChoices.map((img, i) => {
        let borderColor = 'var(--border2)';
        let opacity = '1';
        let bg = 'var(--bg4)';
        
        if (answered) {
          if (img === card.image) {
            borderColor = 'var(--green)'; // Certa brilha verde
            bg = 'rgba(39,174,96,0.1)';
          } else if (img === sess.imgChoiceSelected) {
            borderColor = 'var(--red)'; // A que você errou fica vermelha
            bg = 'rgba(192,57,43,0.1)';
          } else {
            opacity = '0.4'; // As outras apagam
          }
        }
        
        return `
        <div style="aspect-ratio:1; border:3px solid ${borderColor}; border-radius:var(--r2); overflow:hidden; background:${bg}; opacity:${opacity}; cursor:pointer; transition:all 0.2s" 
             onclick="${answered ? '' : `imgChoiceAnswer(${i})`}">
          ${renderSquare(img)}
        </div>`;
      }).join('')}
    </div>
    
    ${answered ? `
    <div class="type-result ${sess.imgChoiceCorrect ? 'ok' : 'fail'}" style="margin-bottom:10px">
      ${sess.imgChoiceCorrect ? '✓ Excelente memória visual!' : '✗ Incorreto.'}
      <div style="font-size:13px;margin-top:4px;color:var(--stone2)">
        ${esc(clean(card.definition))}
      </div>
    </div>
    <div class="rating-row">
      <button class="rating-btn r1" onclick="rateCard(0)"><span class="rating-lbl">De novo</span></button>
      <button class="rating-btn r${sess.imgChoiceCorrect ? '4' : '2'}" onclick="rateCard(${sess.imgChoiceCorrect ? 3 : 1})">
        <span class="rating-lbl">${sess.imgChoiceCorrect ? 'Fácil ✓' : 'Difícil'}</span>
      </button>
    </div>` : ''}
  `;
}

function flipCard() {
  if (!studySession || studySession.flipped) return;
  studySession.flipped = true;
  const fc = document.getElementById('flashcard');
  if (fc) fc.classList.add('flipped');
  setTimeout(() => render(), 250); 
  setTimeout(playAnswerAudio, 250);
}

function rateCard(quality) {
  if (!studySession) return;
  const sess = studySession;
  const card = sess.queue[sess.current];
  if (!card) return;

  // ✨ BLINDAGEM: Garante que as vidas existem no momento exato do clique!
  if (STATS.vidas === undefined || isNaN(STATS.vidas)) STATS.vidas = 3;

if (!sess.isFreeMode) {
    
    // ✨ SISTEMA DE PROTEÇÃO TOTAL: Verifica Eventos, depois Escudos, depois Vidas!
    const hasInfLives = STATS.activeEvent && STATS.activeEvent.id === 'lives_inf';
    const hasInfShield = STATS.activeEvent && STATS.activeEvent.id === 'shields_inf';

    if (quality === 0 && hasInfShield) {
        // Evento da Égide Divina: O erro é perdoado de graça!
        toast('🛡️ Égide Divina Ativa! Nenhuma penalidade no SM-2.', 'blue');
        sess.queue.push(card);
    } 
    else if (quality === 0 && sess.miniShieldActive) {
        sess.miniShieldActive = false; // Consome o escudo da loja
        toast('🛡️ Égide Menor ativada! O card foi protegido.', 'gold');
        sess.queue.push(card);
    } 
    else if (quality === 0 && hasInfLives) {
        // Evento de Imortalidade: Protege a carta sem gastar os ❤️ Corações
        toast('❤️‍🔥 Imortalidade Ativa! Sua vida não foi consumida.', 'red');
        sess.queue.push(card);
    } 
    else if (quality === 0 && STATS.vidas > 0) {
        STATS.vidas--; // Consome a vida normal
        toast('❤️ Vida consumida! O card foi protegido.', 'gold');
        sess.queue.push(card);
        if (typeof saveStats === 'function') saveStats();
    } 
    else {
        // --- LÓGICA NORMAL (Acertou, ou errou sem ter nenhuma defesa) ---
        if (quality === 0) {
            toast('💔 Sem defesas! Penalidade aplicada.', 'err');
            sess.queue.push(card); 
        }

        const result = sm2(card, quality);
        const idx = W.findIndex(w => w.id === card.id);
        if (idx >= 0) {
          Object.assign(W[idx], result);
          W[idx].lastReview = Date.now();
          W[idx].totalReviews = (W[idx].totalReviews || 0) + 1;
          
          if (quality >= 2) {
             W[idx].correctStreak = (W[idx].correctStreak || 0) + 1;
             W[idx].consecutiveFails = 0; 
             W[idx].isLeech = false;
          } else {
             W[idx].correctStreak = 0;
             W[idx].consecutiveFails = (W[idx].consecutiveFails || 0) + 1;
             if (W[idx].consecutiveFails >= 4) {
                 W[idx].isLeech = true; 
             }
          }
          
          const cardToSave = W.find(w => w.id === card.id);
          if (cardToSave) saveCard(cardToSave);
        }
        if (typeof saveStats === 'function') saveStats();
    }
  } else {
    // Modo Treino Livre
    if (quality === 0) sess.queue.push(card);
  }

  setTimeout(playQuestionAudio, 200);

  sess.answered++;
  if (quality >= 2) sess.correct++;
  sess.current++;
  sess.flipped = false;

  sess.hintUsed = false; sess.hintText = '';
  sess.magicHintUsed = false;
  sess.magicHintVisible = false; // ✨ Garante que a caixa suma na próxima carta
  sess.magicHintsActive = 0;     // ✨ Zera o contador de letras reveladas

function checkSpell() {

  // ✨ CORREÇÃO: Limpamos a palavra alvo exatamente do mesmo jeito na hora de checar
  const correctWord = sess.spellTarget.replace(/[\s\u200B-\u200D\uFEFF]/g, '').toLowerCase();
  
  sess.spellCorrect = (userWord === correctWord);
  sess.spellAnswered = true;
  playSfx(sess.spellCorrect ? 'ok' : 'fail');

function checkSyntax() {
  const sess = studySession; if (!sess || sess.syntaxAnswered) return;
  if (sess.isSynonymMatch) {
    const normalizeTxt = (str) => (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    const userWords = sess.syntaxAnswer.map(id => normalizeTxt(sess.syntaxPool.find(p=>p.id===id).word));
    const targetWords = sess.syntaxTargetWords.map(w => normalizeTxt(w));
    const allCorrect = userWords.every(w => targetWords.includes(w));
    const enoughCount = userWords.length >= sess.syntaxNeededCount;
    sess.syntaxCorrect = userWords.length > 0 && allCorrect && enoughCount;
  } else {
    const userTxt = sess.syntaxAnswer.map(id => sess.syntaxPool.find(p=>p.id===id).word).join(' ');
    sess.syntaxCorrect = (userTxt === sess.syntaxTarget);
  }
  sess.syntaxAnswered = true;
  playSfx(sess.syntaxCorrect ? 'ok' : 'fail');
  setTimeout(playAnswerAudio, 100); render();
}

function checkCloze() {
  const sess = studySession; if (!sess || sess.clozeAnswered) return;
  const card = sess.queue[sess.current];
  const userWords = sess.clozeUserAnswers.map(id => sess.clozePool.find(p=>p.id===id).word);
  const expectedWords = sess.clozeAnswers;
  const normalizeTxt = (str) => (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
  
  if (sess.clozeIsRelList) {
    const valids = getValidAnswers(card).map(normalizeTxt);
    const userClean = userWords.map(normalizeTxt);
    sess.clozeCorrect = userClean.length === expectedWords.length && userClean.every(w => valids.includes(w));
  } else {
    const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';
    let allCorrect = true;
    if (userWords.length !== expectedWords.length) allCorrect = false;
    else {
      const valids = isRel ? [...getValidAnswers(card), card.word].map(normalizeTxt) : [];
      for (let i = 0; i < expectedWords.length; i++) {
        const uW = normalizeTxt(userWords[i]); const eW = normalizeTxt(expectedWords[i]);
        if (uW === eW || (isRel && valids.includes(eW) && valids.includes(uW))) continue;
        allCorrect = false; break;
      }
    }
    sess.clozeCorrect = allCorrect;
  }
  sess.clozeAnswered = true; 
  playSfx(sess.clozeCorrect ? 'ok' : 'fail');
  setTimeout(playAnswerAudio, 100); render();
}

// ✨ VARIÁVEL DO DEBOUNCE (Guarda o cronômetro)
let searchTimeout = null; 

function handleSearchInput() {
  const inp = document.getElementById('wordSearch');
  const btn = document.getElementById('clearSearchBtn');
  if (btn && inp) btn.style.display = inp.value.length > 0 ? 'block' : 'none';
  
  // ✨ A MÁGICA DO DEBOUNCE: 
  // Se o usuário digitar outra letra rápido, ele cancela a busca anterior!
  if (searchTimeout) clearTimeout(searchTimeout);
  
  // Só executa a busca pesada se o usuário parar de digitar por 300 milissegundos
  searchTimeout = setTimeout(() => {
    wordDisplayLimit = 15; // Volta para os primeiros 15 ao pesquisar
    updateWordList();      // Atualiza a lista com segurança
  }, 300);
}

function clearSearch() {
  const inp = document.getElementById('wordSearch');
  if (inp) {
    inp.value = '';
    handleSearchInput(); // Atualiza a lista para mostrar tudo de novo
    inp.focus(); // Devolve o cursor piscando para a barra! 
  }
}

function handleFilterChange() {
  wordDisplayLimit = 15;
  updateWordList();
}

function loadMoreWords() {
  wordDisplayLimit += 15; // Aumenta o limite de 50 em 50 
  updateWordList();
}

function updateWordList() {
  const cont = document.getElementById('wordListCont');
  const countLbl = document.getElementById('wordCountLbl');
  if (!cont || !countLbl) return;

  const rawQ = document.getElementById('wordSearch')?.value || '';
  const cat = document.getElementById('wordCat')?.value || '';
  const sort = document.getElementById('wordSort')?.value || 'alpha';

  // Função mágica que remove acentos, 'ç', 'ã', 'é' e transforma em minúsculas
    const normalize = (str) => (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  const q = normalize(rawQ);

  let list = [...W];
  if (q) {
    list = list.filter(w => 
      normalize(w.word).includes(q) || 
      normalize(w.definition).includes(q) || 
      normalize(w.tags).includes(q)
    );
  }

  if (cat) list = list.filter(w => w.category === cat);

  if (sort === 'alpha') list.sort((a,b) => a.word.localeCompare(b.word));
  else if (sort === 'due') list.sort((a,b) => a.nextReview - b.nextReview);
  else if (sort === 'new') list.sort((a,b) => b.createdAt - a.createdAt);
  else if (sort === 'hard') list.sort((a,b) => a.easeFactor - b.easeFactor);

  countLbl.textContent = `${list.length} palavra${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    cont.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><div class="empty-title">Léxico vazio</div><div class="empty-desc">Nenhum resultado encontrado.</div></div>`;
    return;
  }

    // Corta a lista para mostrar apenas até o limite atual
  const visibleList = list.slice(0, wordDisplayLimit);

  let html = `<div class="card" style="margin-bottom:0">`;
  html += visibleList.map(w => `<div class="word-row ${getCardRarity(w).cls}" onclick="openWordDetail('${w.id}')">
    <div class="word-row-main">
      <div class="word-row-word">${w.cardType === 'sinônimo' ? '🔗 ' : (w.cardType === 'antônimo' ? '⚖️ ' : '')}${esc(w.word)}</div>
      <div class="word-row-def">${esc(clean(w.word))}: ${esc(clean(w.definition))}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
      <span class="badge ${getStatus(w)}">${statusLabel(getStatus(w))}</span>
      <div class="word-actions" onclick="event.stopPropagation()">
        <button class="mini-btn edit" onclick="openEditModal('${w.id}')">✏</button>
        <button class="mini-btn danger" onclick="confirmDelete('${w.id}')">✕</button>
      </div>
    </div>
  </div>`).join('');
  html += `</div>`;

    // Adiciona o botão "Carregar mais" se ainda houver palavras ocultas
    if (list.length > wordDisplayLimit) {
    html += `<button class="btn ghost" style="margin-top:12px" onclick="loadMoreWords()">↓ Carregar mais (${list.length - wordDisplayLimit} ocultas)</button>`;
  }

  cont.innerHTML = html;
}

function buildWordForm(word) {
  const w = word || {};
  const defaultCats = ['geral','retórica','filosofia','literatura','erudição','dialética','jurídico','política','ciência','cotidiano'];
  const existingCats = W.map(x => x.category).filter(Boolean);
  const cats = [...new Set([...defaultCats, ...existingCats])].sort();
  if (w.category && !cats.includes(w.category)) cats.push(w.category);
  
  const classes = ['','substantivo','verbo','adjetivo','advérbio','expressão','locução'];
  const bgStyle = (w.image && w.image.startsWith('data:image')) ? `background-image:url('${w.image}');` : '';
  
  // ✨ FUNÇÃO MÁGICA PARA CRIAR O MINI-SELETOR DE IDIOMA
  const lSel = (id, val) => {
    const L = [['pt-BR','🇧🇷'],['en-US','🇺🇸'],['es-ES','🇪🇸'],['fr-FR','🇫🇷'],['de-DE','🇩🇪'],['it-IT','🇮🇹']];
    return `<select class="inp" id="${id}" title="Idioma da Leitura" style="width:35px; padding:0 0 0 6px; font-size:22px; border-radius:var(--r) 0 0 var(--r); border-right:none; background:var(--bg3); color:var(--stone)">
      ${L.map(([v,l]) => `<option value="${v}" ${(val||'pt-BR')===v?'selected':''}>${l}</option>`).join('')}
    </select>`;
  };

  return `
  <div class="form-group" style="text-align:center; background:var(--bg4); padding:16px; border-radius:var(--r2); border:1px dashed var(--border2)">
      <label class="lbl">Imagem da Câmera ou Emoji (Opcional)</label>
      <div id="imgPreview" style="height:100px; width:100px; margin:10px auto; border-radius:var(--r2); display:flex; align-items:center; justify-content:center; font-size:50px; background-size:cover; background-position:center; cursor:pointer; background-color:rgba(0,0,0,0.2); ${bgStyle}" onclick="document.getElementById('fw_img_upload').click()">

      <input class="inp" id="fw_emoji_inp" placeholder="Ou digite um emoji..." style="text-align:center; max-width:200px; margin:0 auto" oninput="handleEmojiUpload(event)" value="${w.image && !w.image.startsWith('data:image') ? w.image : ''}">
    </div>

      <div class="form-group" style="flex:1;margin:0">
        <label class="lbl">Tipo de Card</label>
        <select class="inp" id="fw_type" style="border-color:var(--gold2);color:var(--gold2)" onchange="handleTypeChange()">
          <option value="universal" ${(!w.cardType || w.cardType==='universal')?'selected':''}>🌌 Universal (Gera Tudo)</option>
          <option value="normal" ${(w.cardType)==='normal'?'selected':''}>📖 Palavra Normal</option>

          <option value="técnica" ${(w.cardType)==='técnica'?'selected':''}>🧠 Técnica de Persuasão</option>
          <option value="falácia" ${(w.cardType)==='falácia'?'selected':''}>⚠️ Falácia Lógica</option>
          <option value="citação" ${(w.cardType)==='citação'?'selected':''}>📜 Citação / Frase</option>

    <div class="form-group">

/* ── STATS TAB ── */
function buildStatsTab() {
  const total = W.length;
  const mastered = W.filter(w => getStatus(w) === 'mastered').length;
  const pct = total ? Math.round((mastered / total) * 100) : 0;
  const avgEase = total ? (W.reduce((s, w) => s + w.easeFactor, 0) / total).toFixed(2) : '—';
  const totalRev = STATS.totalReviews || 0;
  const days = [...new Set((STATS.history||[]).map(h => h.date))].length;
  
  // ✨ LÓGICA DO HEATMAP (30 DIAS COM CONTAGEM)
  const last30 = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); 
    d.setDate(d.getDate() - i);
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    const dt = d.toISOString().slice(0,10);
    
    // Pega o histórico desse dia específico e soma todas as revisões feitas nele
    const histDay = (STATS.history||[]).filter(h => h.date === dt);
    const revCount = histDay.reduce((acc, curr) => acc + curr.total, 0);
    
    last30.push({date: dt, count: revCount, isToday: i === 0});
  }

  const catMap = {};
  W.forEach(w => { catMap[w.category||'geral'] = (catMap[w.category||'geral']||0) + 1; });

  return `
    <div class="card">
      <div class="card-head"><div class="card-title">⚑ Progresso Geral</div></div>
      <div class="card-body">
        <div class="ring-wrap">
          <svg class="ring" width="120" height="120" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50" stroke-width="8"/>
            <circle class="ring-fill" cx="60" cy="60" r="50" stroke-width="8"
              stroke-dasharray="${2 * Math.PI * 50}"
              stroke-dashoffset="${2 * Math.PI * 50 * (1 - pct/100)}"/>
            <text class="ring-label" x="60" y="58" text-anchor="middle" dominant-baseline="middle" transform="rotate(90,60,60)">${pct}%</text>
            <text class="ring-sub" x="60" y="72" text-anchor="middle" transform="rotate(90,60,60)">dominado</text>
          </svg>
        </div>
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Palavras</div></div>
          <div class="stat-box"><div class="stat-val">${mastered}</div><div class="stat-lbl">Dominadas</div></div>
          <div class="stat-box"><div class="stat-val">${totalRev}</div><div class="stat-lbl">Revisões</div></div>
          <div class="stat-box"><div class="stat-val">${days}</div><div class="stat-lbl">Dias ativos</div></div>
          <div class="stat-box"><div class="stat-val">${STATS.streak||0}🔥</div><div class="stat-lbl">Sequência</div></div>
          <div class="stat-box"><div class="stat-val">${avgEase}</div><div class="stat-lbl">Facilidade média</div></div>
        </div>
      </div>
    </div>
    
    <!-- ✨ O NOVO GRÁFICO DE CALOR -->
    <div class="card">
      <div class="card-head"><div class="card-title">📅 Constância (Últimos 30 Dias)</div></div>
      <div class="card-body">
        <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px; margin-bottom:12px">
          ${last30.map(d => {
            let bg = 'var(--bg3)'; // Cinza Vazio
            if (d.count > 0 && d.count <= 10) bg = 'rgba(212,175,55, 0.3)'; // Dourado Fraco
            else if (d.count > 10 && d.count <= 30) bg = 'rgba(212,175,55, 0.6)'; // Dourado Médio
            else if (d.count > 30) bg = 'var(--gold)'; // Dourado Forte (Ouro Puro)

            return `<div title="${d.date}: ${d.count} revisões" style="aspect-ratio:1; border-radius:4px; background:${bg}; ${d.isToday ? 'border:2px solid var(--ink); transform:scale(1.1)' : ''}"></div>`;
          }).join('')}
        </div>
        <div style="display:flex; justify-content:flex-end; align-items:center; gap:6px; font-size:10px; color:var(--stone); text-transform:uppercase; letter-spacing:1px">
          <span>Menos</span>
          <div style="width:12px; height:12px; border-radius:3px; background:var(--bg3)"></div>
          <div style="width:12px; height:12px; border-radius:3px; background:rgba(212,175,55, 0.3)"></div>
          <div style="width:12px; height:12px; border-radius:3px; background:rgba(212,175,55, 0.6)"></div>
          <div style="width:12px; height:12px; border-radius:3px; background:var(--gold)"></div>
          <span>Mais</span>
        </div>
      </div>
    </div>

    ${Object.keys(catMap).length > 0 ? `
    <div class="card">
      <div class="card-head"><div class="card-title">📚 Por Categoria</div></div>
      <div class="card-body">
        ${Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([cat,cnt]) => {
          const cpct = Math.round((cnt/total)*100);
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-family:'Cinzel',serif;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--stone3)">${esc(cat)}</span>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stone)">${cnt} · ${cpct}%</span>
            </div>
            <div class="prog-bar" style="margin:0"><div class="prog-fill" style="width:${cpct}%"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}
    <div class="card">
      <div class="card-head"><div class="card-title">⚡ Distribuição SM-2</div></div>
      <div class="card-body">
        ${['new','learning','review','mastered','due'].map(s => {
          const cnt = W.filter(w => getStatus(w) === s).length;
          const p = total ? Math.round((cnt/total)*100) : 0;
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="badge ${s}" style="min-width:80px;justify-content:center">${statusLabel(s)}</span>
            <div class="prog-bar" style="flex:1;margin:0"><div class="prog-fill" style="width:${p}%"></div></div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stone);min-width:30px;text-align:right">${cnt}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function importWords() {
  const txt = document.getElementById('importTA').value;
  if (!txt.trim()) { toast('Cole o texto primeiro!', 'err'); return; }
  
  // ✨ CAPTURA OS VALORES DOS MENUS PARA USAR COMO PADRÃO (FALLBACK)
  const defaultLangWord = gv('importLangWord') || 'pt-BR';
  const defaultLangDef = gv('importLangDef') || 'pt-BR';
  const defaultCategory = gv('importCat') || 'geral';

  const lines = txt.split('\n').filter(l => l.trim().length > 0);
  let added = 0;
  
  // ✨ FUNÇÃO MÁGICA: Lê a Tag (~en). Se não tiver, usa o Default do Menu!
  const parseLangTag = (str, fallbackLang) => {
    if (!str) return { text: '', lang: fallbackLang };
    let s = str.trim();
    const match = s.match(/^~(pt|en|es|fr|de|it)\b\s*/i);
    if (match) {
      const codeMap = { pt:'pt-BR', en:'en-US', es:'es-ES', fr:'fr-FR', de:'de-DE', it:'it-IT' };
      const lang = codeMap[match[1].toLowerCase()];
      const text = s.substring(match[0].length).trim();
      return { text, lang }; // Usou a tag
    }
    return { text: s, lang: fallbackLang }; // Não usou tag, usa o idioma do menu
  };
  
  for (let line of lines) {
     const parts = line.split('|').map(s => s.trim());
     if (parts.length < 2) continue; 
     
     // Aplica as regras de idioma para cada pedacinho!
     const wP = parseLangTag(parts[0], defaultLangWord);
     const dP = parseLangTag(parts[1], defaultLangDef);
     const eP = parseLangTag(parts[2], defaultLangDef);
     const sP = parseLangTag(parts[3], defaultLangDef);
     const aP = parseLangTag(parts[4], defaultLangDef);
     
     // Se a linha não tiver categoria, ele puxa a Categoria Padrão que você digitou no menu
     const cat = parts[5] ? parts[5].trim() : defaultCategory;
     const emoji = parts[6] ? parts[6].trim() : '';
     
     let cType = 'normal';
     if(cat.toLowerCase().includes('técnica')) cType = 'técnica';
     if(cat.toLowerCase().includes('falácia')) cType = 'falácia';
     
     // 1. Cria a Carta Mãe
     W.push(mkCard({ 
       word: wP.text, definition: dP.text, example: eP.text, synonyms: sP.text, antonyms: aP.text,
       category: cat, image: emoji, cardType: cType, 
       langWord: wP.lang, langDef: dP.lang, langEx: eP.lang, langSyn: sP.lang, langAnt: aP.lang 
     }));
     added++;
     
     // 2. Cria a Carta de Sinônimo
     if (sP.text) {
       W.push(mkCard({ 
         word: wP.text, definition: sP.text, example: eP.text, category: cat, image: emoji, cardType: 'sinônimo',
         langWord: wP.lang, langDef: sP.lang, langEx: eP.lang 
       }));
       added++;
     }
     
     // 3. Cria a Carta de Antônimo

function previewImport() {
  const raw = document.getElementById('importTA')?.value || '';
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
  const prev = document.getElementById('importPreview');
  
  if (!prev) return;
  if (!lines.length) { prev.innerHTML = ''; return; }
  
  const items = lines.slice(0, 5).map(line => {
        // Usa a mesma regra de separação nova: '|' ou Tab
    const parts = line.split(/\s*\|\s*|\t/).map(p => p.trim());
    return `<div style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--gold2);font-family:'Cinzel',serif">${esc(parts[0]||'')}</span> — <span style="font-style:italic;color:var(--stone2)">${esc(parts[1]||'')}</span></div>`;
  }).join('');
  
  prev.innerHTML = `<div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--stone);margin-bottom:6px">Prévia (${lines.length} linhas):</div>${items}${lines.length > 5 ? `<div style="font-size:12px;color:var(--stone);margin-top:4px">...e mais ${lines.length - 5}</div>` : ''}`;
}

function exportJSON() {
  const filter = document.getElementById('exportFilter')?.value || '';
  let toExport = W;
  
  if (filter) {
     toExport = W.filter(w => w.category === filter);
     if(toExport.length === 0) { toast('Nenhum card nesta categoria!', 'err'); return; }
  }
  
  const data = JSON.stringify({words: toExport, stats: filter ? {} : STATS, exportedAt: new Date().toISOString()}, null, 2);
  download(`demostenes_${filter ? filter : 'backup'}.json`, data, 'application/json');
  toast(`Exportado ${toExport.length} cards!`, 'ok');
}

function exportCSV() {
  // ✨ Adicionado 'imagem' na lista de cabeçalhos
  const rows = [['tipo','palavra','definição','exemplo','sinônimos','categoria','classe','imagem','intervalo','repetições','próxima revisão']];
  // ✨ Adicionado w.image||'' nos dados a serem exportados
  W.forEach(w => rows.push([w.cardType||'normal', w.word, w.definition, w.example||'', w.synonyms||'', w.category||'', w.wordClass||'', w.image||'', w.interval, w.repetitions, new Date(w.nextReview).toLocaleDateString('pt-BR')]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  download('demostenes_lexico.csv', csv, 'text/csv');
  toast('CSV exportado!', 'ok');
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => { // ✨ Adicionado async aqui
    try {
      const d = JSON.parse(ev.target.result);
      if (d.words && Array.isArray(d.words)) {
        let added = 0;
        d.words.forEach(w => {
          const existing = W.find(x => x.word.toLowerCase() === w.word.toLowerCase() && x.cardType === w.cardType);
          if (!existing) { 
            W.push(w); added++; 
          } else if (!existing.image && w.image) {
            // ✨ Se a palavra já existe mas estava sem imagem, ele "puxa" a imagem do backup!
            existing.image = w.image; 
          }
        });
        if (d.stats) STATS = {...STATS, ...d.stats};
        await save(); // ✨ Salva com segurança
        toast(`${added} palavras importadas/atualizadas!`, 'gold'); render();
      }
    } catch { toast('Arquivo inválido!', 'err'); }
  };
  reader.readAsText(file);
}

function confirmDelete(id) {
  const w = W.find(x => x.id === id);
  if (!w) return;
  openConfirmModal(`Remover "${w.word}" do léxico?`, () => {
    W = W.filter(x => x.id !== id);
    save(); toast('Palavra removida.'); render();
  });
}

function confirmClearAll() {
  openConfirmModal('Apagar TODO o léxico? Esta ação é irreversível.', () => {
    W = []; save(); toast('Léxico limpo.'); render();
  });
}

// ✨ O CÉREBRO DAS DICAS (Consumo por Letra/Palavra)
function getSmartHint(mode, sess, card) {
    let target = card.word;
    
    if (mode === 'syntax') {
        if (sess.isSynonymMatch) {
            const missing = sess.syntaxTargetWords.filter(w => !sess.syntaxAnswer.map(id => sess.syntaxPool.find(p=>p.id===id).word).includes(w));
            if (missing.length > 0) return `Falta: "${missing[0]}"`;
            return "Todos os itens selecionados!";
        } else {
            const wordsArr = sess.syntaxTarget.split(/\s+/);
            const nextIndex = sess.syntaxAnswer.length;
            if (nextIndex < wordsArr.length) return `A próxima palavra é: "${wordsArr[nextIndex]}"`;
            return "Frase completa!";
        }
    } 
    else if (mode === 'cloze') {
        const nextIndex = sess.clozeUserAnswers.length;
        if (nextIndex < sess.clozeAnswers.length) return `A próxima lacuna é: "${sess.clozeAnswers[nextIndex]}"`;
        return "Todas as lacunas preenchidas!";
    } 
    else if (mode === 'spell') {
        const cleanTarget = (sess.spellTarget || target).replace(/[\s\u200B-\u200D\uFEFF]/g, '').toUpperCase();
        const nextIndex = sess.spellAnswer.length;
        if (nextIndex < cleanTarget.length) return `A próxima letra é: "${cleanTarget[nextIndex]}"`;
        return "Palavra completa!";
    }
    else {
        // Modos de Digitação e Contexto
        if (mode === 'scramble' && sess.scrambleTarget) target = sess.scrambleTarget;
        else if ((mode === 'type' || mode === 'context') && (card.cardType === 'sinônimo' || card.cardType === 'antônimo')) {
            const valids = getValidAnswers(card);
            target = valids[0]; 
        }
        const cleanTarget = target.replace(/[\s\u200B-\u200D\uFEFF]/g, '');
        
        if (sess.hintUsed) {
            // Dica Normal (Punição de SM-2): Mostra metade da palavra grátis
            const showLen = Math.max(2, Math.floor(cleanTarget.length / 2));
            return `Começa com: "${cleanTarget.substring(0, showLen).toUpperCase()}..."`;
        } else {
            // Dica Mágica: Mostra exatamente 1 letra a mais para CADA ITEM GASTO!
            const showLen = Math.min(sess.magicHintsActive || 1, cleanTarget.length);
            return `Revelado: "${cleanTarget.substring(0, showLen).toUpperCase()}${(showLen < cleanTarget.length) ? '...' : ''}"`;
        }
    }
}

function updateDynamicHint() {
    const sess = studySession;
    if (!sess || (!sess.hintUsed && !sess.magicHintVisible)) return;
    const card = sess.queue[sess.current];
    const mode = sess.currentAdaptiveMode || studyMode;
    sess.hintText = getSmartHint(mode, sess, card);
}

function useMagicHint() {
  const sess = studySession;
  if (!sess || sess.hintUsed) return; // Se já usou a normal, não precisa da mágica
  
  const card = sess.queue[sess.current];
  const mode = sess.currentAdaptiveMode || studyMode;
  
  // Trava para não gastar dicas à toa se a palavra já estiver toda revelada
  if (mode === 'type' || mode === 'context') {
      const cleanTarget = card.word.replace(/[\s\u200B-\u200D\uFEFF]/g, '');
      if (sess.magicHintsActive >= cleanTarget.length) {
          toast('A palavra inteira já foi revelada!', 'gold');
          return;
      }
  }

  if (!STATS.inventory || STATS.inventory.magicHints <= 0) {
      toast('Você não tem Dicas de Atena!', 'err');
      if (typeof triggerScreenShake === 'function') triggerScreenShake();
      return;
  }
  
  STATS.inventory.magicHints--;
  if (typeof saveStats === 'function') saveStats();
  
  sess.magicHintUsed = true; 
  sess.magicHintVisible = true; // Faz a caixinha aparecer
  sess.magicHintsActive = (sess.magicHintsActive || 0) + 1; // Acumula o número de letras compradas
  
  updateDynamicHint();
  toast('✨ -1 Dica Gasta', 'gold');
  render(); 
}

// ✨ FUNÇÃO QUE ROUBA A DICA ASSIM QUE O JOGADOR CLICAR!
function hideMagicHint() {
   const sess = studySession;
   if(!sess) return;
   if(sess.magicHintVisible) {
       sess.magicHintVisible = false; // Esconde para forçar a comprar outra!
   } else if(sess.hintUsed) {
       updateDynamicHint(); // A dica normal (punida) atualiza de graça
   }
}

function useHint() {
  const sess = studySession;
  if (!sess || sess.hintUsed || sess.magicHintUsed) return;

async function saveNewWord() { 
  const type = gv('fw_type');
  const word = gv('fw_word');
  const def = gv('fw_def');
  if (!word || !def) { toast('Palavra e definição são obrigatórias', 'err'); return; }
  
  const ex = gv('fw_ex'), syn = gv('fw_syn'), ant = gv('fw_ant');
  const ph = gv('fw_ph'), cat = gv('fw_cat'), wc = gv('fw_class');
  
  // ✨ CAPTURANDO CADA BANDEIRINHA INDIVIDUAL
  const tags = gv('fw_tags'), img = gv('fw_image_data');
  const lw = gv('fw_lang_word'), ld = gv('fw_lang_def'), lex = gv('fw_lang_ex');
  const lsyn = gv('fw_lang_syn'), lant = gv('fw_lang_ant');

  if (type === 'universal') {
    let added = 0;
    W.push(mkCard({ word, definition: def, example: ex, synonyms: syn, antonyms: ant, phonetic: ph, category: cat, wordClass: wc, tags, langWord: lw, langDef: ld, langEx: lex, langSyn: lsyn, langAnt: lant, image: img, cardType: 'normal' }));
    added++;
    
    // A carta de sinônimo herda o idioma da bandeirinha de sinônimo!
    if (syn) { W.push(mkCard({ word, definition: syn, example: ex, category: cat, langWord: lw, langDef: lsyn, langEx: lex, cardType: 'sinônimo', image: img })); added++; }
    
    // A carta de antônimo herda o idioma da bandeirinha de antônimo!
    if (ant) { W.push(mkCard({ word, definition: ant, example: ex, category: cat, langWord: lw, langDef: lant, langEx: lex, cardType: 'antônimo', image: img })); added++; }
    
    await save(); toast(`✨ Mágica! ${added} cartas geradas para "${word}"!`, 'gold');
  } else {
    W.push(mkCard({ word, definition: def, example: ex, synonyms: syn, antonyms: ant, phonetic: ph, category: cat, wordClass: wc, tags, langWord: lw, langDef: ld, langEx: lex, langSyn: lsyn, langAnt: lant, image: img, cardType: type }));
    await save(); toast(`"${word}" adicionada ao léxico!`, 'gold');
  }
  document.getElementById('addForm').innerHTML = buildWordForm();
  render();
}

// ✨ MOTOR DE RECONHECIMENTO DE VOZ
function startDictation(inputId, lang, btnElement) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    toast('Seu navegador não suporta microfone.', 'err');
    return;
  }
  
  const recognition = new SpeechRecognition();
  // Puxa a bandeirinha exata do cartão!
  recognition.lang = lang || 'pt-BR'; 
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const oldText = btnElement.textContent;
  btnElement.textContent = '🔴'; // Fica vermelho para mostrar que está gravando
  
  recognition.start();

  recognition.onresult = function(event) {
    const speechResult = event.results[0][0].transcript;
    const inp = document.getElementById(inputId);
    if (inp) {
       // Limpa pontuações finais chatas que a voz às vezes coloca
       inp.value = speechResult.toLowerCase().replace(/[.,!?]$/, '');
    }
    btnElement.textContent = oldText;
  };

  recognition.onspeechend = function() {
    recognition.stop();
    btnElement.textContent = oldText;
  };

  recognition.onerror = function(event) {
    toast('Erro no microfone: ' + event.error, 'err');
    btnElement.textContent = oldText;
  };
}

// Remove os asteriscos para exibição visual
function clean(s) {
  return (s || '').replace(/\*/g, '');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function gv(id) { return (document.getElementById(id)?.value||'').trim(); }
function today() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
}
function statusLabel(s) {
  return {new:'Novo',learning:'Aprendendo',review:'Revisão',due:'Para revisar',mastered:'Dominado'}[s]||s;
}
// Atualize a modeLabel:
function modeLabel(m) {
  return {
    flash:'Flashcard', choice:'Múltipla escolha', type:'Digitação', context:'Contexto',
    tf:'V / F', revchoice:'Inversa', scramble:'Embaralhado', spell:'Letras',
    syntax:'Sintaxe', cloze:'Lacunas', imgchoice:'Escolha Visual', blind:'Ditado Cego', boss:'Prova Final' // ✨ Novidade
  }[m]||m;
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function toast(msg, type) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const t = document.createElement('div');
  t.className = `toast${type?' '+type:''}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

  a.href = URL.createObjectURL(new Blob([content], {type}));

// ✨ GERENCIADOR DE SÉRIE COM ESCUDO DE ESPARTA 🛡️
function updateStreak() {
  const t = today();
  const last = new Date(STATS.lastStudy || 0).toISOString().slice(0,10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  
  if (last === t) return; // Já estudou hoje
  
  if (last === yesterday) {
      // Dia perfeito
      STATS.streak = (STATS.streak || 0) + 1;
  } else {
      // Perdeu um ou mais dias! Verifica se tem Escudo
      if (STATS.inventory && STATS.inventory.shields > 0) {
          STATS.inventory.shields--;
          STATS.streak = (STATS.streak || 0) + 1; // Salva o foguinho e ainda sobe +1!
          toast('🛡️ Escudo de Esparta consumido! Sua ofensiva foi salva.', 'gold');
      } else {
          // Zero escudos, a série morre
          STATS.streak = 1; 
      }
  }
  STATS.lastStudy = Date.now();
  if (typeof saveStats === 'function') saveStats();
}
// ✨ CHAVE MESTRA DO ÁUDIO (Blindagem para iOS e Android)
let isAudioUnlocked = false;

function unlockAudio() {
  if (isAudioUnlocked) return; // Se já destrancou, não faz mais nada
  
  // 1. Destranca a Voz do Robô (Speech Synthesis) com um áudio vazio
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0; // Silencioso
  window.speechSynthesis.speak(u);
  
  // 2. Destranca os Efeitos Sonoros (Beeps)
  if (typeof audioCtx !== 'undefined' && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  
  isAudioUnlocked = true;
  
  // Remove os espiões para não gastar memória, já que o trabalho foi feito!
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}

function attachListeners() {
  // Fica espionando o PRIMEIRO toque do usuário na tela do celular
  document.addEventListener('touchstart', unlockAudio, { once: true });
  document.addEventListener('click', unlockAudio, { once: true });
}
function renderStudy() {
  currentTab = 'study';
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('on', el.dataset.tab === 'study'));
  render();
}

function ouvirPalavra(texto, lang) {
  if (!texto) return;
  
  // 🧹 Essa linha é crucial! Ela cancela o áudio anterior para não travar o jogo
  window.speechSynthesis.cancel(); 
  
  // Limpamos os asteriscos para o robô não ler a palavra "asterisco" no meio da frase
  const textoLimpo = clean(texto);
  
  const u = new SpeechSynthesisUtterance(textoLimpo);
  // Se o idioma não for passado, ele usa pt-BR como escudo de segurança
  u.lang = lang || 'pt-BR'; 
  u.rate = 0.95; // Velocidade ligeiramente mais pausada para soar elegante
  
  window.speechSynthesis.speak(u);
}

function playQuestionAudio() {
  if (!autoPlayAudio || !studySession) return;
  const card = studySession.queue[studySession.current];
  if (!card) return;
  
  const mode = studySession.currentAdaptiveMode || studyMode;
  const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';

  // 1. Modos onde a DICA (Pergunta) que está na tela é a DEFINIÇÃO
  // Isso só acontece para cartas normais nos jogos de adivinhar a palavra
  if (!isRel && (mode === 'type' || mode === 'spell' || mode === 'scramble' || mode === 'context')) {
    // Usa o clean() para a voz nunca ler os *asteriscos* em voz alta
    ouvirPalavra(clean(card.definition), card.langDef || 'pt-BR');
  }
  // A Inversa sempre mostra a definição como dica
  else if (mode === 'revchoice') {
    ouvirPalavra(clean(studySession.revChoicePrompt || card.definition), card.langDef || 'pt-BR');
  }
  // 2. Modos onde a DICA que está na tela é a PALAVRA (Flash, Lacunas, Sintaxe...)
  // E também todos os jogos de Sinônimos/Antônimos (pois a palavra base fica no topo!)
  else {
    ouvirPalavra(card.word, card.langWord || 'pt-BR');
  }
}

function playAnswerAudio() {
  if (!autoPlayAudio || !studySession) return;
  const card = studySession.queue[studySession.current];
  if (!card) return;
  
  const mode = studySession.currentAdaptiveMode || studyMode;
  const isRel = card.cardType === 'sinônimo' || card.cardType === 'antônimo';

  // 1. Modos de Frase: A resposta revelada é a frase/definição inteira
  if (mode === 'syntax') {
     const texto = isRel ? card.definition : (studySession.syntaxTarget || card.definition);
     ouvirPalavra(clean(texto), card.langDef || 'pt-BR');
     return;
  }
  if (mode === 'cloze') {
     ouvirPalavra(clean(card.definition), card.langDef || 'pt-BR');
     return;
  }

  // 2. Modos onde o Alvo era descobrir a PALAVRA ou um Sinônimo específico
  if (mode === 'type' || mode === 'spell' || mode === 'scramble' || mode === 'context' || mode === 'revchoice') {
     if (isRel && mode !== 'revchoice') {
        // Se acertou um sinônimo específico, lê ele. Senão lê a lista toda.
        if (mode === 'spell' && studySession.spellTarget) {
            ouvirPalavra(clean(studySession.spellTarget), card.langDef || 'pt-BR');
        } else if (mode === 'scramble' && studySession.scrambleTarget) {
            ouvirPalavra(clean(studySession.scrambleTarget), card.langDef || 'pt-BR');
        } else {
            ouvirPalavra(clean(card.definition), card.langDef || 'pt-BR');
        }
     } else {
        // Carta normal: lê a palavra que você acertou
        let resposta = card.word;
        if (mode === 'spell' && studySession.spellTarget) resposta = studySession.spellTarget;
        if (mode === 'scramble' && studySession.scrambleTarget) resposta = studySession.scrambleTarget;
        ouvirPalavra(clean(resposta), card.langWord || 'pt-BR');
     }
     return;
  }

  // 3. Modos Clássicos (Flash, Múltipla Escolha, V/F)
  // A pergunta foi a Palavra, então a resposta lida é a Definição
  ouvirPalavra(clean(card.definition), card.langDef || 'pt-BR');
}

// ✨ COMPRESSOR AUTOMÁTICO DE CÂMERA (Versão Ultra-Leve WEBP)
function resizeImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      
      // ✨ Reduzimos de 400 para 250. Fica nítido na tela, mas pesa 80% menos!
      const MAX = 250; 
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } 
      else { if (h > MAX) { w *= MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      
      // ✨ A GRANDE MÁGICA: Trocamos o 'image/jpeg' pesado por 'image/webp' levíssimo
      callback(canvas.toDataURL('image/webp', 0.6)); 
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}
// ✨ PROCESSA O UPLOAD OU EMOJI NO FORMULÁRIO
function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  resizeImage(file, (base64) => {
    document.getElementById('fw_image_data').value = base64;
    document.getElementById('imgPreview').style.backgroundImage = `url(${base64})`;
    document.getElementById('imgPreview').innerHTML = '';

}

function importBackup(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if(data.words && data.stats) {
                // Substitui a memória atual pela do arquivo
                W = data.words;
                STATS = data.stats;
                
                // Salva o STATS no banco de dados
                if (typeof saveStats === 'function') saveStats();
                
                // Salva TODAS as cartas do arquivo no banco de dados na mesma hora
                W.forEach(w => { if (typeof saveCard === 'function') saveCard(w); });
                
                toast('✨ Progresso restaurado com sucesso!', 'gold');
                closeModal();
                updateHeader();
                if (typeof updateWordList === 'function') updateWordList();
                render();
            } else {
                toast('Arquivo incompatível ou corrompido.', 'err');
                triggerScreenShake();
            }
        } catch(err) {
            toast('Erro ao ler o arquivo!', 'err');
            triggerScreenShake();
        }
    };
    reader.readAsText(file);
}

function generateDailyQuests() {

    const todayStr = new Date().toISOString().slice(0, 10);
    if (STATS.questsDate === todayStr && STATS.quests) return;

    const cats = [...new Set(W.map(w => w.category).filter(c => c))];
    const randomCat = cats.length > 0 ? cats[Math.floor(Math.random() * cats.length)] : 'Geral';

    const possibleQuests = [
        { id: 'q_free', desc: 'Responda 15 cartas no Modo Livre', target: 15, rewardCoins: 30, rewardXP: 100 },

        { id: 'q_cat', desc: `Estude 10 cartas da categoria: ${randomCat}`, target: 10, rewardCoins: 45, rewardXP: 120, reqCat: randomCat },
        { id: 'q_crit', desc: 'Consiga 5 Acertos Críticos', target: 5, rewardCoins: 60, rewardXP: 250 }

    STATS.questsDate = todayStr;

// ✨ MOTOR DE PRESTÍGIO E CONQUISTAS (A Bolinha)
function manageAchievements() {
    if (!STATS) return;
    
    // 1. Cria o banco de dados das Conquistas na primeira vez
    if (!STATS.achievements) {
        STATS.achievements = {
            currentPrestige: 1, 
            list: [
                { id: 'ach_cards', name: 'Estudioso Feroz 📚', desc: 'Responda {X} cartas no total', target: 1000, progress: 0, claimed: false, rewardCoins: 1500, rewardXP: 5000 },
                { id: 'ach_crits', name: 'Sorte Divina 🎲', desc: 'Dê {X} Acertos Críticos', target: 100, progress: 0, claimed: false, rewardCoins: 2000, rewardXP: 8000 },
                { id: 'ach_gold', name: 'Toque de Midas 💰', desc: 'Acumule {X} 🪙 jogando', target: 15000, progress: 0, claimed: false, rewardCoins: 3000, rewardXP: 10000 },
                { id: 'ach_pets', name: 'Senhor das Feras 🐉', desc: 'Gere {X} de Afinidade com Pets', target: 500, progress: 0, claimed: false, rewardCoins: 2500, rewardXP: 7000 }
            ]
        };
    }

    // 2. O Olho que tudo vê (Verifica a Bolinha atual)
    const currentTitleInfo = typeof getUserTitle === 'function' ? getUserTitle() : { prestige: 1 };
    const realPrestige = currentTitleInfo.prestige;

    // 3. O RESET ÉPICO: Se a bolinha subiu de nível!
    if (realPrestige > STATS.achievements.currentPrestige) {
        STATS.achievements.list.forEach(ach => {
            // Só reseta e dobra a dificuldade se a conquista já foi concluída E resgatada!
            if (ach.claimed) {
                ach.claimed = false;
                ach.progress = 0; 
                ach.target = ach.target * 2; // O dobro da dificuldade!
                // O prêmio aumenta em 50% para valer a pena o sofrimento
                ach.rewardCoins = Math.floor(ach.rewardCoins * 1.5); 
                ach.rewardXP = Math.floor(ach.rewardXP * 1.5);
            }
        });
        
        STATS.achievements.currentPrestige = realPrestige;
        if (typeof saveStats === 'function') saveStats();
    }
}

function claimQuest(index, type = 'daily') {

// ✨ SISTEMA LIVE-OPS: EVENTOS E MARATONAS DE FIM DE SEMANA
function runEventManager() {
    if (!STATS) return;
    const now = Date.now();
    
    // O calendário: descobre se é dia de semana ou fim de semana
    const dateObj = new Date();
    const dayOfWeek = dateObj.getDay(); // 0 = Domingo, 6 = Sábado
    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

    // 1. O Lixeiro: Limpa o evento se o tempo (1 hora) já esgotou
    if (STATS.activeEvent && now > STATS.activeEvent.endTime) {
        toast(`⏳ O evento ${STATS.activeEvent.name} terminou!`, 'stone');
        STATS.activeEvent = null;
        if (typeof saveStats === 'function') saveStats();
    }

    // Se já tem um evento rodando agora, não faz novos sorteios
    if (STATS.activeEvent) return;

    // 2. Controle de Sorteios (A Magia do Fim de Semana!)
    const todayStr = dateObj.toISOString().slice(0, 10);
    
    if (!isWeekend) {
        // TRAVA RIGOROSA (Segunda a Sexta): Só sorteia 1x por dia!
        if (STATS.lastEventRoll === todayStr) return;
        STATS.lastEventRoll = todayStr;
    } else {
        // FIM DE SEMANA: Ele marca o dia, mas NÃO TE BLOQUEIA de sortear de novo quando o evento acabar!
        STATS.lastEventRoll = todayStr;
    }

    // 3. A Roleta de Eventos (RNG)
    const roll = Math.random(); 
    let eventTriggered = null;

    const epics = [
        { id: 'coins_triple', name: 'Chuva de Ouro 💰', desc: 'Todas as recompensas de moedas são TRIPLAS!', color: 'var(--gold)' },
        { id: 'xp_triple', name: 'Sabedoria de Atena 🦉', desc: 'Todo o XP ganho nas respostas é TRIPLO!', color: '#e024ff' }
    ];
    
    const rares = [
        { id: 'coins_double', name: 'Benção de Hermes 🪙', desc: 'Todas as recompensas de moedas são DUPLAS!', color: 'var(--green)' },
        { id: 'xp_double', name: 'Foco de Apolo ☀️', desc: 'Todo o XP ganho nas respostas é DUPLO!', color: '#ff245e' },
        { id: 'lives_inf', name: 'Imortalidade ❤️‍🔥', desc: 'Vidas NÃO são consumidas ao errar!', color: 'var(--red)' },
        { id: 'shields_inf', name: 'Égide Divina 🛡️', desc: 'Nenhuma falha pune o seu SM-2!', color: 'var(--blue)' }
    ];

    if (isWeekend) {
        // ✨ MARATONA (Sáb/Dom): 100% DE CHANCE DE EVENTO! 
        // Acaba um, começa outro na mesma hora. (15% Épico, 85% Raro)
        if (roll < 0.15) {
            eventTriggered = epics[Math.floor(Math.random() * epics.length)];
        } else {
            eventTriggered = rares[Math.floor(Math.random() * rares.length)];
        }
    } else {
        // 💼 DIAS NORMAIS (Seg a Sex): 5% Épico, 35% Raro, 60% chance de NADA acontecer.
        if (roll < 0.05) {
            eventTriggered = epics[Math.floor(Math.random() * epics.length)];
        } else if (roll < 0.40) {
            eventTriggered = rares[Math.floor(Math.random() * rares.length)];
        }
    }

    // 4. Se ativou algo na roleta, o evento dura exatamente 1 Hora (3.600.000 ms)
    if (eventTriggered) {
        STATS.activeEvent = {
            ...eventTriggered,
            endTime: now + 3600000 
        };
        
        // Notificação especial se for sábado ou domingo!
        if (isWeekend) {
            toast(`🎉 MARATONA DE FIM DE SEMANA: ${eventTriggered.name}!`, 'gold');
        } else {
            toast(`🎉 EVENTO INICIADO: ${eventTriggered.name}!`, 'gold');
        }
        
        if (typeof saveStats === 'function') saveStats();
    }
}
// ✨ SISTEMA GACHA: O CASSINO DO DESTINO (Yin-Yang)
function showYinYang() {
    let btn = document.getElementById('btnYinYang');
    if (!btn) {
        btn = document.createElement('button');
        btn.id = 'btnYinYang';
        btn.innerHTML = '☯︎';
        // Estilo dramático: Grande, brilhante e no centro da tela!
        btn.style.cssText = `
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; background: none; border: none; color: white;
            text-shadow: 0 0 20px #e024ff, 0 0 40px #00e5ff;
            cursor: pointer; z-index: 9999;
            animation: pulseYinYang 0.8s infinite alternate;
        `;
        btn.onclick = openGachaModal;
        document.body.appendChild(btn);
        
        // Injeta a animação CSS de pulsar se não existir
        if (!document.getElementById('cssYinYang')) {
            const style = document.createElement('style');
            style.id = 'cssYinYang';
            style.innerHTML = '@keyframes pulseYinYang { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }';
            document.head.appendChild(style);
        }
    }
    
    btn.style.display = 'block';
    
    // ⏱️ PRESSÃO PSICOLÓGICA: O botão foge depois de 3.5 segundos!
    setTimeout(() => {
        if (btn && btn.style.display === 'block') {
            btn.style.display = 'none';
        }
    }, 3500);
}

function openGachaModal() {
    // Esconde o botão Yin-Yang da tela, pois você já o capturou!
    const btn = document.getElementById('btnYinYang');
    if (btn) btn.style.display = 'none';

    openModal(`
        <h3 style="text-align:center; color:white; margin-bottom:10px; font-size:24px">☯︎ A Roda da Fortuna</h3>
        <p style="text-align:center; font-size:12px; color:var(--stone2); margin-bottom:20px">Os Deuses notaram seu Acerto Crítico. Deseja testar sua sorte?<br><br><b style="color:#00e5ff">Vitória (50%):</b> Ganha um consumível mágico.<br><b style="color:var(--red)">Derrota (50%):</b> Os deuses tomam um item do seu inventário.</p>
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:10px">
            <button class="btn success" style="background:#e024ff; color:white; border:none; padding:10px 20px; font-weight:bold; font-size:16px; box-shadow: 0 0 15px rgba(224, 36, 255, 0.4)" onclick="playGacha()">🎲 Girar a Roleta</button>
            <button class="btn ghost" onclick="closeModal()">Sair Correndo</button>
        </div>
    `);
}

function playGacha() {
    // A Máquina da Sorte!
    const win = Math.random() >= 0.5;
    
    const possibleItems = [
        { id: 'doubleCoins', name: 'Néctar dos Deuses 🍷' },
        { id: 'doubleXp', name: 'Água de Mnemósine 💧' },
        { id: 'miniShields', name: 'Égide Menor 🛡️' }
    ];
    
    let resultHtml = '';
    if (!STATS.inventory) STATS.inventory = { magicHints: 0, skips: 0, shields: 0, doubleCoins: 0, miniShields: 0, doubleXp: 0 };
    
    if (win) {
        // 🎉 VITÓRIA: Sorteia um item e te dá!
        const item = possibleItems[Math.floor(Math.random() * possibleItems.length)];
        STATS.inventory[item.id] = (STATS.inventory[item.id] || 0) + 1;
        resultHtml = `
            <div style="text-align:center; animation: fadeIn 0.5s">
                <div style="font-size:50px; margin-bottom:10px">🎉</div>
                <h3 style="color:var(--gold)">VITÓRIA!</h3>
                <p style="font-size:14px; color:white; margin-top:10px">Os deuses sorriram! Você ganhou:<br><b style="color:#00e5ff; font-size:16px">${item.name}</b></p>
            </div>`;
        toast('Sorte Grande!', 'gold');
        if (typeof shootConfetti === 'function') shootConfetti();
    } else {
        // 🌩️ DERROTA: Varre seu inventário para ver se você tem algo para perder
        const ownedItems = possibleItems.filter(i => STATS.inventory[i.id] > 0);
        
        if (ownedItems.length > 0) {
            // Pega um item que você tem e subtrai 1
            const itemToLose = ownedItems[Math.floor(Math.random() * ownedItems.length)];
            STATS.inventory[itemToLose.id]--;
            resultHtml = `
                <div style="text-align:center; animation: fadeIn 0.5s">
                    <div style="font-size:50px; margin-bottom:10px">🌩️</div>
                    <h3 style="color:var(--red)">DERROTA!</h3>
                    <p style="font-size:14px; color:white; margin-top:10px">A sorte virou as costas! Você perdeu 1x:<br><b style="color:var(--red); font-size:16px">${itemToLose.name}</b></p>
                </div>`;
            toast('Azar...', 'err');
            if(typeof triggerScreenShake === 'function') triggerScreenShake();
        } else {
            // Se você é pobre e não tem itens, você escapa impune!
            resultHtml = `
                <div style="text-align:center; animation: fadeIn 0.5s">
                    <div style="font-size:50px; margin-bottom:10px">💨</div>
                    <h3 style="color:var(--stone)">ESCAPOU!</h3>
                    <p style="font-size:14px; color:white; margin-top:10px">Você perdeu na roleta, mas como seus bolsos estão vazios, os deuses ficaram com pena. Nada foi levado!</p>
                </div>`;
            toast('Sorte na miséria!', 'ok');
        }
    }
    
    if (typeof saveStats === 'function') saveStats();
    
    // Atualiza o HTML do Modal com o resultado final
    openModal(`
        ${resultHtml}
        <div style="display:flex; justify-content:center; margin-top:20px">
            <button class="btn ghost" onclick="closeModal()">Aceitar o Destino</button>
        </div>
    `);
}
// ✨ SISTEMA GACHA DA LOJA (Loot Boxes)
// ✨ SISTEMA GACHA DA LOJA (Loot Boxes com Som!)
function buyGachaBox(boxType, price) {
    if (!STATS.inventory) STATS.inventory = { magicHints: 0, skips: 0, shields: 0, doubleCoins: 0, miniShields: 0, doubleXp: 0 };
    
    if ((STATS.moedas || 0) < price) { 
        toast('Moedas insuficientes para apostar!', 'err'); 
        if(typeof triggerScreenShake === 'function') triggerScreenShake(); 
        return; 
    }
    
    STATS.moedas -= price;
    if (typeof updateHeader === 'function') updateHeader();

    const roll = Math.random(); 
    let rewardHtml = '';
    let boxName = '';
    let soundType = 'loss'; // O som padrão é o de tristeza kkkk

    if (boxType === 'bronze') {
        boxName = 'Ânfora de Bronze';
        if (roll < 0.60) {
            STATS.moedas += 50; STATS.earnedXP += 50;

        } else if (roll < 0.90) {

            soundType = 'win';
        } else {
            STATS.inventory.doubleCoins += 1; STATS.inventory.doubleXp += 1;
